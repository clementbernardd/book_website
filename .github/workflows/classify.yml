name: Classify books

on:
  workflow_dispatch:
    inputs:
      force_isbn:
        description: "ISBN-13 to reclassify (optional)"
        required: false
      force_all:
        description: "Reclassify every book"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Cache sentence-transformer model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: st-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run classifier
        run: |
          ARGS=""
          if [ -n "${{ inputs.force_isbn }}" ]; then
            ARGS="$ARGS --force ${{ inputs.force_isbn }}"
          fi
          if [ "${{ inputs.force_all }}" = "true" ]; then
            ARGS="$ARGS --force-all"
          fi
          python scripts/classify.py $ARGS

      - name: Commit generated data
        run: |
          git config user.name  "breezy-bot"
          git config user.email "breezy-bot@users.noreply.github.com"
          git add data/ public/covers/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): classify books"
            git push
          fi
